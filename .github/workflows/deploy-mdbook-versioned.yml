name: Deploy Versioned mdBook to higher-kinded-j.github.io

on:
  push:
    branches:
      - main
    paths:
      - 'hkj-book/**'
      - '.github/workflows/deploy-mdbook-versioned.yml'
      - '.github/scripts/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v0.1.9 for release or "latest" for snapshot)'
        required: true
        default: 'latest'

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    env:
      MDBOOK_ADMONISH_VERSION: "1.19.0"
      MDBOOK_ALERTS_VERSION: "0.7.0"
      BOOK_ROOT_DIR: "hkj-book"

    permissions:
      contents: read

    steps:
      - name: Checkout 'higher-kinded-j' repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for version detection

      - name: Determine deployment version and path
        id: version
        run: |
          VERSION=""
          DEPLOY_PATH=""
          VERSION_LABEL=""

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release
            VERSION="${{ github.ref_name }}"
            DEPLOY_PATH="${VERSION}"
            VERSION_LABEL="${VERSION}"
            echo "Deploying tagged release: ${VERSION}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "latest" ]]; then
            # Manual dispatch with specific version
            VERSION="${{ github.event.inputs.version }}"
            DEPLOY_PATH="${VERSION}"
            VERSION_LABEL="${VERSION}"
            echo "Deploying manual version: ${VERSION}"
          else
            # Latest snapshot from main
            VERSION="latest"
            DEPLOY_PATH="latest"
            VERSION_LABEL="Latest (Snapshot)"
            echo "Deploying latest snapshot from main branch"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "deploy_path=${DEPLOY_PATH}" >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Setup mdBook and Rust Environment
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.51'

      - name: Install 'mdbook-admonish'
        run: |
          cargo install mdbook-admonish --version ${{ env.MDBOOK_ADMONISH_VERSION }} --locked

      - name: Install 'mdbook-alerts'
        run: |
          cargo install mdbook-alerts --version ${{ env.MDBOOK_ALERTS_VERSION }} --locked

      - name: Setup mdbook-admonish assets
        working-directory: ./${{ env.BOOK_ROOT_DIR }}
        run: |
          mdbook-admonish install .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Copy root files to book source
        run: |
          BOOK_SRC_DIR="${{ env.BOOK_ROOT_DIR }}/src"
          mkdir -p "$BOOK_SRC_DIR"
          echo "Copying root files to $BOOK_SRC_DIR"
          cp CONTRIBUTING.md "$BOOK_SRC_DIR/"
          cp LICENSE.md "$BOOK_SRC_DIR/"
          cp CODE_OF_CONDUCT.md "$BOOK_SRC_DIR/"
          echo "Files copied:"
          ls -l "$BOOK_SRC_DIR"

      - name: Inject version information into book
        run: |
          # Add version metadata that can be used by the version switcher
          cat >> "${{ env.BOOK_ROOT_DIR }}/book.toml" << EOF

          [output.html.version]
          current = "${{ steps.version.outputs.version }}"
          label = "${{ steps.version.outputs.version_label }}"
          EOF
        shell: bash

      - name: Determine change-tracking baseline
        id: baseline
        run: |
          # The version being deployed decides which baseline "new content" is
          # measured against:
          #   * tagged release vX.Y.Z -> the previous tag
          #   * latest/snapshot        -> the most recent tag
          VERSION="${{ steps.version.outputs.version }}"
          BASE=""
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BASE="$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)"
          else
            BASE="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          fi

          if [[ -n "$BASE" ]]; then
            echo "Change tracking baseline: ${BASE}"
          else
            echo "No baseline tag found; change tracking will be a no-op"
          fi
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "since_label=${BASE}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build mdBook
        working-directory: ./${{ env.BOOK_ROOT_DIR }}
        env:
          # Empty values make the change-tracking preprocessor a no-op.
          HKJ_CHANGES_BASE: ${{ steps.baseline.outputs.base }}
          HKJ_CHANGES_SINCE_LABEL: ${{ steps.baseline.outputs.since_label }}
        run: mdbook build

      - name: Post-process SEO tags (og:url + canonical + per-page JSON-LD)
        run: python .github/scripts/postprocess_seo.py
        env:
          MDBOOK_OUTPUT_DIR: ./${{ env.BOOK_ROOT_DIR }}/book
          # Every deploy (latest and each vX.Y.Z) canonicalises to /latest/ so
          # old versions consolidate ranking onto the current docs.
          HKJ_CANONICAL_BASE: "https://higher-kinded-j.github.io/latest/"

      - name: Generate llms-full.txt (full-text corpus for AI crawlers)
        run: python .github/scripts/generate_llms_full.py
        env:
          MDBOOK_SRC_DIR: ./${{ env.BOOK_ROOT_DIR }}/src
          MDBOOK_OUTPUT_DIR: ./${{ env.BOOK_ROOT_DIR }}/book

      - name: Generate Sitemap
        run: python .github/scripts/generate_sitemap.py
        env:
          MDBOOK_OUTPUT_DIR: ./${{ env.BOOK_ROOT_DIR }}/book
          MDBOOK_SITE_URL: "https://higher-kinded-j.github.io/${{ steps.version.outputs.deploy_path }}/"

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: higher-kinded-j/higher-kinded-j.github.io
          path: gh-pages-repo
          token: ${{ secrets.GH_PAGES_PAT }}

      - name: Update versions.json metadata
        run: |
          python .github/scripts/update_versions.py \
            --repo-dir gh-pages-repo \
            --version "${{ steps.version.outputs.version }}" \
            --version-label "${{ steps.version.outputs.version_label }}"
        shell: bash

      - name: Copy built book to deployment directory
        run: |
          DEPLOY_PATH="gh-pages-repo/${{ steps.version.outputs.deploy_path }}"

          # Remove old version if it exists
          rm -rf "$DEPLOY_PATH"

          # Create deployment directory and copy book
          mkdir -p "$DEPLOY_PATH"
          cp -r ${{ env.BOOK_ROOT_DIR }}/book/* "$DEPLOY_PATH/"

          echo "Book deployed to: $DEPLOY_PATH"
          ls -la "$DEPLOY_PATH"
        shell: bash

      - name: Create/update root index.html, 404.html, robots.txt, llms.txt, and social preview image
        run: |
          # Always copy the redirect page to root to ensure it's up to date
          cp .github/scripts/root-index.html gh-pages-repo/index.html
          echo "Root index.html updated"

          # Copy 404 page that redirects old URLs to /latest/
          cp .github/scripts/404.html gh-pages-repo/404.html
          echo "404.html updated"

          # Copy robots.txt for search engines
          cp .github/scripts/robots.txt gh-pages-repo/robots.txt
          echo "robots.txt updated"

          # Copy llms.txt for AI discoverability (from latest build)
          if [ -f "${{ env.BOOK_ROOT_DIR }}/book/llms.txt" ]; then
            cp ${{ env.BOOK_ROOT_DIR }}/book/llms.txt gh-pages-repo/llms.txt
            echo "llms.txt copied to root"
          fi

          # Copy llms-full.txt (full-text corpus) for AI discoverability
          if [ -f "${{ env.BOOK_ROOT_DIR }}/book/llms-full.txt" ]; then
            cp ${{ env.BOOK_ROOT_DIR }}/book/llms-full.txt gh-pages-repo/llms-full.txt
            echo "llms-full.txt copied to root"
          fi

          # Copy social preview image to root for Open Graph meta tags
          cp ${{ env.BOOK_ROOT_DIR }}/src/preview.png gh-pages-repo/preview.png
          echo "Social preview image (preview.png) copied to root"
        shell: bash

      - name: Commit and push changes
        working-directory: gh-pages-repo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: Deploy ${{ steps.version.outputs.version_label }} documentation"
            git push origin main
          fi
        shell: bash
