# Higher-Kinded-J Arity Migration Recipes (0.2.x -> 0.3.0)
# These recipes add WitnessArity bounds to witness types and type parameters,
# introduced when the type arity system was added in version 0.3.0.
#
# Usage:
#   rewrite {
#     activeRecipe("org.higherkindedj.openrewrite.AddArityBounds")
#   }

---
type: specs.openrewrite.org/v1beta/recipe
name: org.higherkindedj.openrewrite.AddArityBounds
displayName: Add WitnessArity bounds (0.2.x to 0.3.0)
description: >-
  Migrates Higher-Kinded-J code from 0.2.x to 0.3.0 by adding WitnessArity
  bounds to witness types and type parameters that use Kind. This was required
  when the type arity system (WitnessArity, TypeArity) was introduced. The
  required imports are added automatically by the sub-recipes.
tags:
  - higher-kinded-j
  - migration
  - arity
recipeList:
  - org.higherkindedj.openrewrite.AddWitnessArityToWitness
  - org.higherkindedj.openrewrite.AddArityBoundsToTypeParameters

---
type: specs.openrewrite.org/v1beta/recipe
name: org.higherkindedj.openrewrite.AddWitnessArityToWitness
displayName: Add WitnessArity to witness classes
description: >-
  Adds 'implements WitnessArity<TypeArity.Unary>' or 'implements
  WitnessArity<TypeArity.Binary>' to witness class definitions that implement
  Kind or Kind2. Required imports are added automatically.
tags:
  - higher-kinded-j
  - witness
recipeList:
  - org.higherkindedj.openrewrite.AddWitnessArityToWitnessClass

---
type: specs.openrewrite.org/v1beta/recipe
name: org.higherkindedj.openrewrite.AddArityBoundsToTypeParameters
displayName: Add arity bounds to type parameters
description: >-
  Adds 'F extends WitnessArity<TypeArity.Unary>' (or TypeArity.Binary for
  Kind2 and binary type classes) bounds to generic type parameters used as a
  witness with Kind, Kind2, type classes, or transformers. Required imports
  are added automatically.
tags:
  - higher-kinded-j
  - bounds
recipeList:
  - org.higherkindedj.openrewrite.AddArityBoundsToTypeParametersRecipe
